<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prism Ulto</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="fouc.js"></script>
</head>
<body>

  <!-- Fullscreen Background Overlay -->
  <div class="bg-overlay"></div>

  <div class="dashboard">
    
    <!-- Top Left: Search -->
    <div class="widget-area top-left">
      <div class="search-trigger">
        <span class="search-icon-leading">🔍</span>
        <input type="text" id="mainSearch" placeholder="Search..." autocomplete="off">
      </div>
    </div>

    <!-- Top Right: Timer -->
    <div class="widget-area top-right">
      <div class="timer-minimal glass">
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="timer-modes">
          <button class="timer-duration-btn" data-minutes="25">25m</button>
          <button class="timer-duration-btn" data-minutes="45">45m</button>
          <button class="timer-duration-btn" data-minutes="60">60m</button>
          <button id="timerRestBtn" class="timer-mode-btn">Rest</button>
        </div>
        <div class="timer-controls">
          <button id="timerToggleBtn" class="timer-icon-btn">▶</button>
          <button id="timerResetBtn" class="timer-icon-btn">↺</button>
        </div>
      </div>
    </div>

    <!-- Center: Clock & Main Focus -->
    <main class="center-focus">
      <div class="clock-wrap">
        <h1 id="clockDisplay">00:00</h1>
      </div>
      
      <div class="greeting-wrap">
        <h2 id="greetingText">Good morning</h2>
        <div id="weatherWidget" class="weather-widget">
          <div id="weatherIcon" class="weather-icon"></div>
          <span id="weatherTemp">--°C</span>
        </div>
      </div>

      <div class="focus-widget glass">
        <p class="focus-label">What is your main focus for today?</p>
        <div id="focusInputArea">
            <input type="text" id="dailyFocusInput" placeholder="Enter focus..." autocomplete="off">
        </div>
        <div id="dailyFocusDisplay" style="display:none">
            <span class="focus-text"></span>
            <button id="clearFocusBtn">✕</button>
        </div>
      </div>
    </main>

    <!-- Bottom Left: Calendar -->
    <div class="widget-area bottom-left">
      <div class="widget-container glass" id="calendarWidget">
        <div class="widget-header">
          <h3>Calendar</h3>
          <div class="header-actions">
            <a href="https://calendar.google.com/calendar/r/eventedit" target="_blank" class="add-btn-minimal" title="Add Event">+</a>
            <a href="https://calendar.google.com" target="_blank" class="header-shortcut" title="Open Calendar">↗</a>
          </div>
        </div>
        <div id="calendarEvents" class="minimal-list">
          <button id="connectGoogleBtn" class="btn-minimal">Connect Google</button>
        </div>
      </div>
    </div>

    <!-- Bottom Right: Google Tasks -->
    <div class="widget-area bottom-right">
      <div class="widget-container glass" id="tasksWidget">
        <div class="widget-header">
          <h3>Google Tasks</h3>
          <div class="header-actions">
            <a href="https://tasks.google.com/" target="_blank" class="add-btn-minimal" title="Add Task">+</a>
            <a href="https://tasks.google.com" target="_blank" class="header-shortcut" title="Open Tasks">↗</a>
          </div>
        </div>
        <div id="tasksList" class="minimal-list">
          <p class="status-msg">Sign in to view tasks</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Bottom Dock -->
  <div class="dock-wrapper">
    <div class="dock glass">
      <div id="quickLinksGrid" class="minimal-links grouped-links"></div>
      <div class="dock-separator"></div>
      <div class="floating-actions">
        <button id="notesToggleBtn" class="icon-btn" title="Take Notes">📝</button>
        <div class="profile-mini" id="userProfileBtn">
          <div id="userAvatar" class="avatar-circle">?</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Notes Panel -->
  <div id="notesPanel" class="notes-panel glass">
    <div class="panel-header">
      <h3 id="notesPanelTitle">Quick Notes</h3>
      <div class="header-actions">
        <button id="addNoteBtn" class="btn-icon" title="New Note">+</button>
        <button id="closeNotesBtn" class="btn-icon">✕</button>
      </div>
    </div>
    
    <div class="notes-container">
      <!-- List View -->
      <div id="notesListView" class="notes-list-view">
        <div id="notesList" class="notes-list">
          <!-- Notes will be injected here -->
        </div>
      </div>

      <!-- Editor View (Hidden by default) -->
      <div id="notesEditorView" class="notes-editor-view" style="display: none;">
        <div class="editor-header">
          <button id="backToNotesBtn" class="btn-icon" title="Back">←</button>
          <input type="text" id="noteTitleInput" placeholder="Note Title">
        </div>
        <textarea id="notesArea" placeholder="Write something..."></textarea>
        <div class="editor-actions">
          <button id="deleteNoteBtn" class="btn-icon btn-danger" title="Delete Note">🗑</button>
          <button id="saveNoteBtn" class="btn-minimal">Save</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer-credit">
    &copy; 2026 Surendiran. All rights reserved.
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
